<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Malware Scanner</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #121212;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .scanner-card {
        background: #1e1e1e;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.7);
        text-align: center;
        width: 400px;
    }

    h1 {
        margin-bottom: 20px;
        font-size: 1.8em;
        color: #ff4b4b;
    }

    #drop-area {
        border: 2px dashed #ff4b4b;
        padding: 20px;
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.3s;
    }

    #drop-area.hover {
        background-color: #ff4b4b22;
    }

    #drop-area p {
        margin: 0;
    }

    input[type="file"] {
        display: none;
    }

    button {
        margin-top: 20px;
        padding: 10px 25px;
        background-color: #ff4b4b;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1em;
        transition: background 0.3s;
    }

    button:hover {
        background-color: #ff1a1a;
    }

    #result {
        margin-top: 25px;
        font-size: 1.2em;
        font-weight: bold;
        min-height: 30px;
    }

    /* Scanner bar */
    #scanner-bar-container {
        margin-top: 20px;
        background-color: #333;
        height: 10px;
        width: 100%;
        border-radius: 5px;
        overflow: hidden;
        display: none;
    }

    #scanner-bar {
        height: 100%;
        width: 0%;
        background-color: #ff4b4b;
        animation: scan 3s linear forwards;
    }

    @keyframes scan {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    #result.benign { color: #4caf50; }
    #result.malicious { color: #ff4b4b; }
</style>
</head>
<body>
<div class="scanner-card">
    <h1>🛡 Image Malware Scanner</h1>
    <div id="drop-area">
        <p>Drag & Drop your image here<br>or click to browse</p>
        <input type="file" id="imageInput">
    </div>
    <button onclick="scanImage()">Scan Image</button>

    <!-- Scanner bar animation -->
    <div id="scanner-bar-container">
        <div id="scanner-bar"></div>
    </div>

    <div id="result"></div>
</div>

<script>
    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('imageInput');
    const resultDiv = document.getElementById('result');
    const scannerContainer = document.getElementById('scanner-bar-container');
    const scannerBar = document.getElementById('scanner-bar');

    // Drag & drop events
    dropArea.addEventListener('click', () => fileInput.click());
    dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('hover'); });
    dropArea.addEventListener('dragleave', e => dropArea.classList.remove('hover'));
    dropArea.addEventListener('drop', e => {
        e.preventDefault();
        dropArea.classList.remove('hover');
        if (e.dataTransfer.files.length) fileInput.files = e.dataTransfer.files;
    });

    function scanImage() {
        if (!fileInput.files.length) {
            alert("Please select an image first!");
            return;
        }

        resultDiv.innerText = "";
        resultDiv.className = "";
        scannerContainer.style.display = "block";
        scannerBar.style.width = "0%";

        // Start the animation
        scannerBar.style.animation = "none";
        scannerBar.offsetHeight; // trigger reflow
        scannerBar.style.animation = "scan 3s linear forwards";

        // After animation ends, fetch backend result
        setTimeout(() => {
            const formData = new FormData();
            formData.append("image", fileInput.files[0]);

            fetch("/scan", { method: "POST", body: formData })
            .then(res => res.json())
            .then(data => {
                scannerContainer.style.display = "none";
                resultDiv.innerText = data.result;
                if(data.result.includes('Malicious')) {
                    resultDiv.classList.add('malicious');
                } else {
                    resultDiv.classList.add('benign');
                }
            })
            .catch(err => {
                console.error(err);
                scannerContainer.style.display = "none";
                resultDiv.innerText = "Error scanning image!";
                resultDiv.classList.add('malicious');
            });
        }, 3000); // match the animation duration
    }
</script>
</body>
</html>
